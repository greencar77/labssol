<div class="container">
  <h1>Book List</h1>

  <form [formGroup]="bookForm" (ngSubmit)="addBook()" class="book-form">
    <div class="form-group">
      <label for="title">Title</label>
      <input id="title" type="text" formControlName="title" placeholder="Book Title">
    </div>
    <div class="form-group">
      <label for="author">Author</label>
      <input id="author" type="text" formControlName="author" placeholder="Author Name">
    </div>
    <div class="form-group">
      <label for="releaseYear">Release Year</label>
      <input id="releaseYear" type="number" formControlName="releaseYear" placeholder="YYYY">
    </div>
    <button type="submit" [disabled]="!bookForm.valid">Add Book</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Release Year</th>
      </tr>
    </thead>
    <tbody>
      @for (book of books; track book.title) {
        <tr>
          <td>{{ book.title }}</td>
          <td>{{ book.author }}</td>
          <td>{{ book.releaseYear }}</td>
        </tr>
      }
    </tbody>
  </table>
</div>
